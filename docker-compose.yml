services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Moscow
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/import/workflows:ro
    restart: unless-stopped

volumes:
  n8n_data:
